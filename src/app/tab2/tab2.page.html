<app-header></app-header>

<ion-content>
    <ion-list [inset]="true">
        <ion-item *ngFor="let rented_slot of rented_slots">
            <ion-label>
                <strong>{{ rented_slot.spot.name }}</strong><br>
                <ion-note color="medium" class="ion-text-wrap">
                    {{ rented_slot.start_date_time | date: 'shortDate' : '' : 'pt' }}<br>({{ rented_slot.start_date_time | date: 'HH:mm' }} - {{ rented_slot.end_date_time | date: 'HH:mm' }})
                </ion-note>
            </ion-label>
            <div class="metadata-end-wrapper" slot="end">
                <ion-note color="medium">Código de acesso: <br>{{ rented_slot.keypass }}</ion-note>
            </div>
        </ion-item>
    </ion-list>
</ion-content>
